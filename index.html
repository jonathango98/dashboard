<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <script>
      // Set theme immediately to prevent white flash
      (function() {
        var mode = 'system';
        try { var stored = localStorage.getItem('colorMode'); if (stored) mode = JSON.parse(stored); } catch(e) {}
        if (mode === 'system') {
          mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', mode);
      })();
    </script>
    <div id="loading-screen" style="
      position: fixed;
      inset: 0;
      background: var(--bg-page);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    ">
      <div style="text-align: center; font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-secondary);">
        <div style="
          width: 28px;
          height: 28px;
          border: 3px solid var(--border);
          border-top-color: var(--text-secondary);
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
          margin: 0 auto 12px;
        "></div>
        <div style="font-size: 14px; font-weight: 500; letter-spacing: 0.5px;">Loading</div>
      </div>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
